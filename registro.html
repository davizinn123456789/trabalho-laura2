<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body>
    <div class="login-container">
        <form action="erros.html">
            <h2 style="text-align: center; color: #4180ab;">Registro</h2>   
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>CPF</label>
                <input type="text" placeholder="000.000.000-00">
            </div>
            <div class="botoes">
                <button type="submit" class="btn btn-enviar">Enviar</button>
                <a href="inicio.html" class="btn btn-voltar">Voltar</a>
            </div>
        </form>
    </div>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #e4ebf0; 
            display: flex; 
            justify-content: center; 
            padding: 50px 0; 
        }
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 400px;
        }
        .input-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #4180ab;
            font-weight: bold;
        }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #8ab3cf; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        .botoes { 
            display: flex; 
            gap: 10px; 
            margin-top: 20px; 
        }
        .btn { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 5px; 
            cursor: pointer; 
            border: none; 
        }
        .btn-enviar { 
            background: #4180ab; 
            color: #ffffff; 
        }
        .btn-voltar { 
            background: #bdd1de; 
            color: #2f383f; 
        }
        .btn-enviar:hover { 
            background: #8ab3cf; 
        }
        .btn-voltar:hover { 
            background: #8ab3cf; 
            color: #ffffff; 
        }
    </style>
</body>
</html>
