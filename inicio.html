<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Sistema Judiciário</title>
</head>
<body>
    <header class="topo">
        <h1>SISTEMA JUDICIÁRIO DO BRASIL</h1>
    </header>
    <main class="container-centro">
        <div class="inicio-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/70/Supreme_Federal_Court_of_Brazil.jpg" 
                 alt="Supremo Tribunal Federal" style="width:100%; max-height:220px; object-fit:cover; border-radius:8px; margin-bottom:20px;">
            <h1>BEM VINDO!</h1>
            <div class="botoes-container">
                <a href="registro.html" class="btn">Registro</a>
                <a href="login.html" class="btn">Login</a>
            </div>
        </div>
    </main>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #e4ebf0;
        }
        .topo {
            color: #ffffff;
            text-align: center;
            padding: 20px;
            background-color: #4180ab;
            margin: 10px;
            border-radius: 12px;
        }
        .container-centro {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .inicio-card {
            color: #2f383f;
            background-color: #bdd1de;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 500px;
        }
        .botoes-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            color: #ffffff;
            text-decoration: none;
            background-color: #4180ab;
            font-size: 18px;
            padding: 12px 25px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #8ab3cf;
        }
    </style>
</body>
</html>
